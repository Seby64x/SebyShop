<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina Principală</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="main">
        <h2>Salut, <span id="usernameDisplay"></span></h2>
        <form id="postForm">
            <input type="file" id="fileInput" accept="image/*,video/*" required>
            <button type="submit">Postează</button>
        </form>
        <div id="postsContainer"></div>
        <h2>Chat</h2>
        <div id="chatContainer"></div>
        <form id="chatForm">
            <input type="text" id="chatMessage" placeholder="Scrie un mesaj..." required>
            <button type="submit">Trimite</button>
        </form>
        <button id="logoutButton">Logout</button>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
