<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina principală</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Bine ai venit, <span id="usernameDisplay"></span>!</h1>
        <h2>Postează o imagine sau un video</h2>
        <form id="postForm">
            <input type="file" id="fileInput" accept="image/*,video/*" required>
            <button type="submit">Postează</button>
        </form>
        <h2>Postările tale:</h2>
        <div id="postsContainer"></div>
        <button onclick="logout()">Deconectare</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
