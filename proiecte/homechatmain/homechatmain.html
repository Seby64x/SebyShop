<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autentificare / Înregistrare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Bun venit pe Social Website!</h1>
        <div class="form-container">
            <h2>Autentificare</h2>
            <form id="loginForm">
                <input type="text" id="loginUsername" placeholder="Nume utilizator" required>
                <input type="password" id="loginPassword" placeholder="Parolă" required>
                <button type="submit">Autentificare</button>
            </form>
            <h2>Înregistrare</h2>
            <form id="registerForm">
                <input type="text" id="registerUsername" placeholder="Nume utilizator" required>
                <input type="password" id="registerPassword" placeholder="Parolă" required>
                <button type="submit">Înregistrare</button>
            </form>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
